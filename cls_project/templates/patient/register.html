{% extends "base.html" %}
{% block title %}Patient Registration{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-primary">
      <div class="card-header bg-primary text-white text-center">
        <h5 class="mb-0"><i class="bi bi-person-plus-fill"></i> Patient Registration</h5>
      </div>
      <div class="card-body p-4">
        <div class="alert alert-info small"><i class="bi bi-info-circle-fill"></i> Registering automatically issues your CLS key pair from the KGC and generates your first anonymous pseudonym (RID).</div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username (Real ID)</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <div class="mt-3 text-center small">Already registered? <a href="{{ url_for('patient.login') }}">Login</a></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
