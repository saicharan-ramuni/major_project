<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HA Admin Login — Healthcare BCCA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:linear-gradient(135deg,#1a6fc4,#0d4f8c);min-height:100vh;display:flex;align-items:center;}
.card{border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="text-center text-white mb-4">
        <i class="fas fa-hospital fa-3x mb-2"></i>
        <h3 class="fw-bold">Hospital Admin</h3>
        <p class="opacity-75">Trusted Authority — System Setup & Key Management</p>
      </div>
      <div class="card p-5">
        <h4 class="fw-bold text-center mb-4">
          <i class="fas fa-user-shield text-primary me-2"></i>HA Login
        </h4>
        {% if error %}
        <div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <input type="text" class="form-control" name="username" value="admin" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="fas fa-sign-in-alt me-2"></i>Login as Hospital Admin
          </button>
        </form>
        <hr>
        <p class="text-center text-muted small">Default: admin / admin</p>
        <a href="/" class="btn btn-outline-secondary w-100 btn-sm">Back to Home</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Launcher switch button -->
<a href="http://localhost:5000" title="Back to Mode Selector"
   style="position:fixed;bottom:24px;right:24px;z-index:9999;
          background:#0f2027;color:#fff;border-radius:50px;
          padding:10px 18px;font-size:.82rem;font-weight:600;
          text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.4);
          display:flex;align-items:center;gap:8px;transition:.2s;"
   onmouseover="this.style.background='#065f46'"
   onmouseout="this.style.background='#0f2027'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  Switch Mode
</a>
</body></html>
