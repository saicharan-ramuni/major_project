<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Healthcare BCCA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { background:#f0f4f8; }
  .card { border:none; border-radius:14px; box-shadow:0 6px 24px rgba(0,0,0,.1); }
  .navbar { background:#0d4f8c !important; }
</style>
</head>
<body>
<nav class="navbar navbar-dark"><div class="container">
  <a class="navbar-brand fw-bold" href="/"><i class="fas fa-heartbeat me-2"></i>Healthcare BCCA</a>
  <a href="/" class="btn btn-outline-light btn-sm">Home</a>
</div></nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card p-5">
        <h3 class="fw-bold mb-4"><i class="fas fa-user-plus text-primary me-2"></i>Registration</h3>

        {% if error %}
        <div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST">
          <!-- Role -->
          <div class="mb-4">
            <label class="form-label fw-bold">Role</label>
            <div class="d-flex gap-3">
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="role" id="rolePatient" value="PATIENT"
                       {% if request.args.get('role','PATIENT')=='PATIENT' %}checked{% endif %} onchange="toggleFields()">
                <label class="form-check-label" for="rolePatient">
                  <i class="fas fa-user-injured text-primary me-1"></i>Patient
                </label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="role" id="roleDoctor" value="DOCTOR"
                       {% if request.args.get('role')=='DOCTOR' %}checked{% endif %} onchange="toggleFields()">
                <label class="form-check-label" for="roleDoctor">
                  <i class="fas fa-user-md text-success me-1"></i>Doctor
                </label>
              </div>
            </div>
          </div>

          <!-- Real Identity -->
          <div class="mb-3">
            <label class="form-label fw-bold">Real Identity (RID_i)</label>
            <input type="text" class="form-control" name="rid" required
                   placeholder="Aadhaar number / SSN (Patient) or Medical License ID (Doctor)">
            <div class="form-text">Kept secret. Used only for pseudonym generation by HA.</div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label fw-bold">Password (PW_i)</label>
            <input type="password" class="form-control" name="password" required>
          </div>

          <!-- DOB -->
          <div class="mb-3">
            <label class="form-label fw-bold">Date of Birth (DOB_i)</label>
            <input type="date" class="form-control" name="dob" required>
            <div class="form-text">Used to compute α_i = H₁(DOB, SA, OD). Acts as biometric substitute.</div>
          </div>

          <!-- Security Answer -->
          <div class="mb-3">
            <label class="form-label fw-bold">Security Answer (SA_i)</label>
            <input type="text" class="form-control" name="security_answer" required
                   placeholder="e.g., Mother's maiden name">
          </div>

          <!-- Other Details (role-specific) -->
          <div class="mb-4" id="odPatient">
            <label class="form-label fw-bold">Blood Group</label>
            <select class="form-select" name="other_details" id="odPatientSelect">
              <option value="A+">A+</option><option value="A-">A-</option>
              <option value="B+">B+</option><option value="B-">B-</option>
              <option value="AB+">AB+</option><option value="AB-">AB-</option>
              <option value="O+">O+</option><option value="O-">O-</option>
            </select>
          </div>
          <div class="mb-4 d-none" id="odDoctor">
            <label class="form-label fw-bold">Medical Registration Number</label>
            <input type="text" class="form-control" name="other_details" id="odDoctorInput"
                   placeholder="e.g., MCI-123456">
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="fas fa-user-plus me-2"></i>Register
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleFields() {
  const isDoctor = document.getElementById('roleDoctor').checked;
  document.getElementById('odPatient').classList.toggle('d-none', isDoctor);
  document.getElementById('odDoctor').classList.toggle('d-none', !isDoctor);
  document.getElementById('odPatientSelect').disabled = isDoctor;
  document.getElementById('odDoctorInput').disabled  = !isDoctor;
}
toggleFields();
</script>

<!-- Launcher switch button -->
<a href="http://localhost:5000" title="Back to Mode Selector"
   style="position:fixed;bottom:24px;right:24px;z-index:9999;
          background:#0f2027;color:#fff;border-radius:50px;
          padding:10px 18px;font-size:.82rem;font-weight:600;
          text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.4);
          display:flex;align-items:center;gap:8px;transition:.2s;"
   onmouseover="this.style.background='#065f46'"
   onmouseout="this.style.background='#0f2027'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  Switch Mode
</a>
</body></html>
