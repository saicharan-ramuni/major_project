<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Successful — Healthcare BCCA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:#f0f4f8;}
.card{border:none;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.1);}
.pseudo-box{background:#1e1e2e;color:#a6e3a1;border-radius:8px;padding:14px;
            font-family:monospace;font-size:.8rem;word-break:break-all;}
</style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#0d4f8c">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="fas fa-heartbeat me-2"></i>Healthcare BCCA</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-5 text-center">

        <div class="mb-4">
          <div style="width:80px;height:80px;background:#d1fae5;border-radius:50%;
                      display:flex;align-items:center;justify-content:center;margin:0 auto;">
            <i class="fas fa-check-circle text-success fa-3x"></i>
          </div>
        </div>

        <h3 class="fw-bold mb-1">Registration Successful!</h3>
        <p class="text-muted mb-4">
          Your account has been created.
          <span class="badge {% if role == 'PATIENT' %}bg-primary{% else %}bg-success{% endif %} ms-1">
            <i class="fas fa-{% if role == 'PATIENT' %}user-injured{% else %}user-md{% endif %} me-1"></i>
            {{ role|title }}
          </span>
        </p>

        <div class="text-start mb-4">
          <div class="text-muted small fw-bold mb-1">Your Pseudonym ID (ID_i) — Anonymous Identity</div>
          <div class="pseudo-box">{{ pseudo_id }}</div>
          <div class="text-muted mt-2" style="font-size:.75rem;">
            <i class="fas fa-shield-alt me-1"></i>
            Your real identity (<strong>{{ rid }}</strong>) is never stored on-chain.
            Only this pseudonym is public.
          </div>
        </div>

        <a href="/login" class="btn btn-primary btn-lg w-100 fw-bold">
          <i class="fas fa-sign-in-alt me-2"></i>Proceed to Login
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Launcher switch button -->
<a href="http://localhost:5000" title="Back to Mode Selector"
   style="position:fixed;bottom:24px;right:24px;z-index:9999;
          background:#0f2027;color:#fff;border-radius:50px;
          padding:10px 18px;font-size:.82rem;font-weight:600;
          text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.4);
          display:flex;align-items:center;gap:8px;transition:.2s;"
   onmouseover="this.style.background='#065f46'"
   onmouseout="this.style.background='#0f2027'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  Switch Mode
</a>
</body>
</html>
